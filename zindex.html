<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
           
            width:100px;
            height:100px;
            position: absolute; 
            opacity: 0.5;
        }
        .box1{
            
            background-color: red;
            left: 30px;
            top: 30px;
            /* padding-bottom: 30px; */
            z-index: 3;
            
        }

        .box2{
             
            background-color:green;
            
            left: 20px;
            top: 20px;
            /* padding-bottom: 20px; */
            z-index: 4;
            
            
        }

        .box3{
            background-color: blue;
            
            left: 40px;
            top: 20px;
            /* padding-bottom: 20px; */
            z-index: 1;
        }
    </style>
</head>
<body>
    
    <div class="box box1">red</div>
    <div class="box box2">green</div>
    <div class="box box3">blue</div>
</body>
</html>
